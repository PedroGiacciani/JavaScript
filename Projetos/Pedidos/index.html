<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <header>
            <h1>Simulador de pedidos</h1>
        </header>
        <main>
            <p>Qual o seu nome: <input type="text" name="nome" id="inome" autocomplete="off"></p>
            <p>Qual o sabor da sua pizza: <input type="text" name="pizza" id="ipizza" autocomplete="off"></p>
            <input type="button" value="Pedir" onclick="chamar()">
            <div id="res"></div>
        </main>
    </div>
    <footer>
        <p>&copy; Site desenvolvido por <a href="https://github.com/pedrogiacciani">Pedro Giacciani</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
