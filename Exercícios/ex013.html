<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregamento</title>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <script>
        function carregarPagina(callback){  
            setTimeout(callback, 1500)
        }

        const aviso = () => alert("Página carregada com sucesso")

        carregarPagina(aviso)
    </script>
</body>
</html>
