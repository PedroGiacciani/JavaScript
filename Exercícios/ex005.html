<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de JavaScript</title>
</head>
<body>
    <h1>Digite um número par: </h1>
    <input type="number" id="inum" name="num">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res">
        Digite um número par
    </div>

    <script>
        function verificar(){
            var n = Number(document.getElementById('inum').value)
            var res = document.getElementById('res')
            
            if(n%2 == 0){
                res.innerHTML = `O número ${n} é par !`
            } else {
                res.innerHTML = `O número ${n} não é par !`
            }
        }
    </script>
</body>
</html>
