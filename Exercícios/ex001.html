<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de JavaScript</title>
</head>
<body>
    <h1>Digite duas idades: </h1>
    <input type="number" id="idd1" name="idade1">
    <input type="number" id="idd2" name="idade2">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res">
        Digite as idades para ver qual é maior
    </div>

    <script>
        function verificar(){
            var i1 = Number(document.getElementById('idd1').value)
            var i2 = Number(document.getElementById('idd2').value)
            var res = document.getElementById('res')

            if(i1 > i2){
                res.innerHTML = `A pessoa com ${i1} anos é mais velha que a pessoa com ${i2} anos`
            } else{
                res.innerHTML = `A pessoa com ${i2} anos é mais velha que a pessoa com ${i1} anos`
            }
        }
    </script>
</body>
</html>
