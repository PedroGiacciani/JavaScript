<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de JavaScript</title>
</head>
<body>
    <p>Digite um número: <input type="number" name="num1" id="inum1"></p>
    <input type="button" value="Clique aqui!" onclick="verificar()">
    
    <div id="res">
        Interaja com o botão!
    </div>

    <script>
        function verificar(){
            var n = Number(document.getElementById('inum1').value)
            var res = document.getElementById('res')
            res.innerHTML = ``
            for(var i = 0; i <=10; i++){
                var m = i * n
                res.innerHTML += `${i} X ${n} = ${m} <br>`
            }
        }
    </script>
</body>
</html>
