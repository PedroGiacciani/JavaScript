<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de JavaScript</title>
</head>
<body>
    <h1>Digite o comprimento, a altura e a largura do cubo: </h1>
    <input type="number" id="icomp" name="comp">
    <input type="number" id="ialt" name="alt">
    <input type="number" id="ilarg" name="larg">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res">
        Digite as dimensões pedidas
    </div>

    <script>
        function verificar(){
            var c = Number(document.getElementById('icomp').value)
            var a = Number(document.getElementById('ialt').value)
            var l = Number(document.getElementById('ilarg').value)
            var v = c * a * l
            var res = document.getElementById('res')
            res.innerHTML = `O volume do cubo é ${v}`
        }
    </script>
</body>
</html>
