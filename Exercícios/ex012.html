<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de JavaScript</title>
</head>
<body>
    <p>Digite um número: <input type="number" name="num1" id="inum1"></p>
    <p>Digite outro número: <input type="number" name="num2" id="inum2"></p>
    <input type="button" value="Clique aqui!" onclick="verificar()">
    
    <div id="res">
        Interaja com o botão!
    </div>

    <script>
        function verificar(){
           var a = []
           a.push(Number(document.getElementById('inum1').value))
           a.push(Number(document.getElementById('inum2').value))

           var S = a[0] + a[1]

           var res = document.getElementById('res')
           res.innerHTML = `A soma entre ${a[0]} e ${a[1]} é ${S}` 
        }
    </script>
</body>
</html>
