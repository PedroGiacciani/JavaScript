<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script</title>
    <style>
        body{
            font: normal 20pt arial;
        }
    </style>
</head>
<body>
    <script>
        var sal = Number(window.prompt('Digite seu salário'));
        var salform = sal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.write("Seu salário é " + salform);

        /*
            Operadores: 
            5 + 2 = 7
            5 - 2 = 3
            5 * 2 = 10
            5/2 = 2,5
            5%2 = 1
            5**2 = 25

            Auto atribuição:
            var n = 5
            n+=5 = n + 5
            n-=5 = n - 5
            n*=
            n/=
            n**=
            n%=

            Incremento: 
            x++
            x--
        */
    </script>
</body>
</html>
