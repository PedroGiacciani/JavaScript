<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script</title>
    <style>
        body{
            font: normal 20pt arial;
        }
    </style>
</head>
<body>
    <script>
        var sal = Number(window.prompt('Digite seu salário: '));
        var salform = sal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.write(`Seu salário é ${salform}`);
    </script>
</body>
</html>
