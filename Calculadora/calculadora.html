<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Calculadora em JavaScript</h1>
    </header>
    <main>
        <section id="calculadora">
            <div id="tela">
                Esperando por números...
            </div>
            <table id="botoes">
                <tr>
                    <td><input type="button" value="1" onclick="adicionar(1)"></td>
                    <td><input type="button" value="2" onclick="adicionar(2)"></td>
                    <td><input type="button" value="3" onclick="adicionar(3)"></td>
                    <td><input type="button" value="+" onclick="adicionar('+')"></td>
                </tr>
                <tr>
                    <td><input type="button" value="4" onclick="adicionar(4)"></td>
                    <td><input type="button" value="5" onclick="adicionar(5)"></td>
                    <td><input type="button" value="6" onclick="adicionar(6)"></td>
                    <td><input type="button" value="-" onclick="adicionar('-')"></td>
                </tr>
                <tr>
                    <td><input type="button" value="7" onclick="adicionar(7)"></td>
                    <td><input type="button" value="8" onclick="adicionar(8)"></td>
                    <td><input type="button" value="9" onclick="adicionar(9)"></td>
                    <td><input type="button" value="X" onclick="adicionar('x')"></td>
                </tr>
                <tr>
                    <td><input type="button" value="Clear" onclick="clear()"></td>
                    <td><input type="button" value="0" onclick="adicionar(0)"></td>
                    <td><input type="button" value="=" onclick="resultado()"></td>
                    <td><input type="button" value="/" onclick="adicionar('/')"></td>
                </tr>
            </table>
        </section>
    </main>
    <footer>&copy; Site desenvolvido por <a href="https://github.com/pedrogiacciani" target="_blank">Pedro Giacciani</a></footer>
    <script src="script.js"></script>
</body>
</html>
